<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Phoenix Business Advisory | Seminar Verification</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
    <main class="container">

        <header class="header">
            <img src="assets/phoenix-logo.png" alt="Phoenix Business Advisory" class="brand-logo">

            <div>
                <h1>Kadi Seminar</h1>
                <p>QR Verification and Attendance System</p>
            </div>
        </header>

        <section class="card">
            <div class="step-label">Step 1</div>
            <h2>Upload Registration Excel File</h2>
            <p>Select the latest Zoho exported Excel, XLS, or CSV file.</p>

            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">

            <button id="loadExcel" type="button">
                Load Registrations
            </button>
        </section>

        <section class="card">
            <div class="step-label">Step 2</div>
            <h2>Scan Participant QR Code</h2>

            <button id="startScanner" type="button">
                Start QR Scanner
            </button>

            <div id="reader"></div>
        </section>

        <section class="card result-card" id="resultCard">
            <div class="step-label">Scan Result</div>

            <div id="statusBox" class="waiting">
                Waiting for QR scan...
            </div>
        </section>

        <section class="stats">
            <article class="stat">
                <span id="registeredCount">0</span>
                <p>Checked In</p>
            </article>

            <article class="stat">
                <span id="duplicateCount">0</span>
                <p>Duplicate</p>
            </article>

            <article class="stat">
                <span id="failedCount">0</span>
                <p>Rejected</p>
            </article>
        </section>

        <button id="downloadAttendance" type="button" class="download-button">
            Download Attendance
        </button>

    </main>

    <script src="script.js"></script>
</body>
</html>
